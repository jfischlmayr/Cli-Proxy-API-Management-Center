name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 1.2.3 or v1.2.3)
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      INPUT_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Normalize release version
        shell: bash
        run: |
          set -euo pipefail
          version="${INPUT_VERSION}"
          version="${version//[$'\t\r\n ']/}"
          if [ -z "${version}" ]; then
            echo "Version input cannot be empty" >&2
            exit 1
          fi

          if [[ "${version}" != v* ]]; then
            tag_name="v${version}"
          else
            tag_name="${version}"
          fi

          echo "TAG_NAME=${tag_name}" >> "$GITHUB_ENV"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists" >&2
            exit 1
          fi

          git tag "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ env.TAG_NAME }}

      - name: Prepare release assets
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${TAG_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          : > release-notes.md
          git log --pretty=format:"- %h %s" "${range}" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
